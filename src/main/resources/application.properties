spring.application.name=ui5-generator



server.port=${PORT:8080}
# Server port
# ${PORT:8080} means: use PORT env variable if set
# (needed for Railway/BTP deployment)
# falls back to 8080 on local machine

# ── NVIDIA Llama Config ──────────────────────────
# Get key from: https://integrate.api.nvidia.com

nvidia.api.key=
nvidia.model=meta/llama-3.1-405b-instruct



# ── Gemini Config ────────────────────────────────
# Get key from: https://aistudio.google.com/apikey
# Using gemini-2.0-flash for fast responses
# and large token output (8192 output tokens)
gemini.api.key=
gemini.model=gemini-2.5-flash
